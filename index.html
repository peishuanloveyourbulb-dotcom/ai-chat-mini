<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat ✦ 極簡聊天</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0f1a14;
    --surface: #1a2b21;
    --surface-hover: #223a2c;
    --border: #2d4a38;
    --text: #e8f0eb;
    --text-dim: #8fa898;
    --accent: #a8f0c6;
    --accent-warm: #f0e2b5;
    --user-bubble: #2d4a38;
    --ai-bubble: #1e3328;
    --danger: #f0a8a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(168,240,198,0.08), rgba(240,226,181,0.05));
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .header-title span {
    color: var(--accent-warm);
    font-style: italic;
    margin-left: 4px;
    font-size: 14px;
    font-weight: 400;
  }

  .settings-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .settings-btn:hover, .settings-btn:active {
    background: var(--surface-hover);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ===== SETUP PANEL ===== */
  .setup-panel {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    gap: 20px;
  }

  .setup-panel.active { display: flex; }

  .setup-group label {
    display: block;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .setup-group select,
  .setup-group input,
  .setup-group textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .setup-group select:focus,
  .setup-group input:focus,
  .setup-group textarea:focus {
    border-color: var(--accent);
  }

  .setup-group textarea {
    min-height: 100px;
    resize: vertical;
    line-height: 1.6;
  }

  .setup-group .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  .save-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-warm));
    color: var(--bg);
    border: none;
    padding: 14px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 1px;
    transition: opacity 0.2s;
    margin-top: 8px;
  }

  .save-btn:active { opacity: 0.8; }

  .danger-btn {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px;
    border-radius: 14px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .danger-btn:active { background: rgba(240,168,168,0.1); }

  /* ===== CHAT AREA ===== */
  .chat-area {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .chat-area.hidden { display: none; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.7;
    word-break: break-word;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    background: var(--user-bubble);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    color: var(--text);
  }

  .message.ai {
    background: var(--ai-bubble);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .message.system {
    align-self: center;
    max-width: 90%;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 8px;
  }

  .message.error {
    background: rgba(240,168,168,0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    align-self: center;
    max-width: 90%;
    font-size: 13px;
    text-align: center;
  }

  .typing-indicator {
    display: none;
    align-self: flex-start;
    padding: 12px 20px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
  }

  .typing-indicator.active { display: flex; gap: 5px; }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ===== INPUT BAR ===== */
  .input-bar {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-bar textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 22px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-bar textarea:focus { border-color: var(--accent); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent-warm));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; }

  .send-btn svg {
    width: 20px; height: 20px;
    fill: var(--bg);
  }

  /* ===== WELCOME ===== */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    text-align: center;
    gap: 16px;
  }

  .welcome-icon {
    font-size: 48px;
    opacity: 0.8;
  }

  .welcome h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: var(--accent);
    font-weight: 600;
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.8;
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ===== RESPONSIVE ===== */
  .model-bar {
    display: flex;
    padding: 6px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .model-bar select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 16px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    text-align: center;
  }

  @media (min-width: 600px) {
    .messages { padding: 24px 40px; }
    .message { max-width: 70%; }
    .input-bar { padding: 16px 40px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">AI Chat <span>✦ mini</span></div>
  <div style="display:flex;gap:8px;">
    <button class="settings-btn" onclick="newChat()" id="newChatBtn" style="display:none;">✦ 新對話</button>
    <button class="settings-btn" onclick="toggleSetup()">⚙ 設定</button>
  </div>
</div>

<!-- SETUP PANEL -->
<div class="setup-panel" id="setupPanel">
  <button class="settings-btn" onclick="toggleSetup()" style="align-self:flex-start;margin-bottom:8px;">← 返回聊天</button>
  <div class="setup-group">
    <label>🤖 選擇 AI 服務</label>
    <select id="providerSelect" onchange="updateModelHint()">
      <option value="anthropic">Claude（Anthropic）</option>
      <option value="openai">ChatGPT（OpenAI）</option>
      <option value="gemini">Gemini（Google）</option>
      <option value="openrouter">OpenRouter（多模型）</option>
      <option value="deepseek">DeepSeek</option>
    </select>
  </div>

  <div class="setup-group">
    <label>🔑 API Key</label>
    <input type="password" id="apiKeyInput" placeholder="在這裡貼上你的 API Key">
    <div class="hint">你的 Key 只會存在這支手機的瀏覽器裡，不會傳到任何地方</div>
  </div>

  <div class="setup-group">
    <label>📝 模型名稱</label>
    <input type="text" id="modelInput" placeholder="留空使用預設模型">
    <div class="hint" id="modelHint">預設：claude-sonnet-4-6</div>
  </div>

  <div class="setup-group">
    <label>💬 系統設定（選填）</label>
    <textarea id="systemPrompt" placeholder="告訴 AI 它的角色、語氣、限制...&#10;留空會使用預設：友善健談的繁體中文助手"></textarea>
    <div class="hint">這段文字會在每次對話開頭傳給 AI，決定它的行為。留空也沒關係，會自動用預設設定～</div>
  </div>

  <button class="save-btn" onclick="saveSettings()">✦ 儲存並開始聊天</button>
  <button class="danger-btn" onclick="clearAll()">清除所有資料重新開始</button>
</div>

<!-- CHAT AREA -->
<div class="chat-area hidden" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>Ready to Chat</h2>
    <p>輸入任何訊息開始對話<br>AI 會記住這次對話的上下文</p>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing-indicator" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <div class="status-bar" id="statusBar">就緒</div>

  <div class="model-bar" id="modelBar" style="display:none;">
    <select id="chatModelSelect" onchange="switchModel()">
      <option>載入模型中...</option>
    </select>
    <button class="settings-btn" onclick="fetchModels()" style="padding:6px 10px;font-size:12px;margin-left:6px;">↻</button>
  </div>

  <div class="input-bar">
    <textarea id="userInput" rows="1" placeholder="輸入訊息..." 
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ===== STATE =====
let conversationHistory = [];
let isStreaming = false;
let config = {
  provider: 'anthropic',
  apiKey: '',
  model: '',
  systemPrompt: ''
};

// ===== PROVIDER CONFIGS =====
const PROVIDERS = {
  anthropic: {
    name: 'Claude',
    defaultModel: 'claude-sonnet-4-6',
    endpoint: 'https://api.anthropic.com/v1/messages',
    buildRequest: (messages, model, systemPrompt) => ({
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': config.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 4096,
        system: systemPrompt || undefined,
        messages: messages
      })
    }),
    parseResponse: (data) => {
      if (data.error) throw new Error(data.error.message);
      return data.content?.[0]?.text || '（無回應）';
    }
  },
  openai: {
    name: 'ChatGPT',
    defaultModel: 'gpt-4o-mini',
    endpoint: 'https://api.openai.com/v1/chat/completions',
    buildRequest: (messages, model, systemPrompt) => {
      const msgs = systemPrompt 
        ? [{ role: 'system', content: systemPrompt }, ...messages]
        : messages;
      return {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: msgs,
          max_tokens: 4096
        })
      };
    },
    parseResponse: (data) => {
      if (data.error) throw new Error(data.error.message);
      return data.choices?.[0]?.message?.content || '（無回應）';
    }
  },
  gemini: {
    name: 'Gemini',
    defaultModel: 'gemini-2.5-flash',
    getEndpoint: (model) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${config.apiKey}`,
    buildRequest: (messages, model, systemPrompt) => {
      const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));
      const body = { contents };
      if (systemPrompt) {
        body.systemInstruction = { parts: [{ text: systemPrompt }] };
      }
      return {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      };
    },
    parseResponse: (data) => {
      if (data.error) throw new Error(data.error.message);
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '（無回應）';
    }
  },
  openrouter: {
    name: 'OpenRouter',
    defaultModel: 'anthropic/claude-sonnet-4-6',
    endpoint: 'https://openrouter.ai/api/v1/chat/completions',
    buildRequest: (messages, model, systemPrompt) => {
      const msgs = systemPrompt
        ? [{ role: 'system', content: systemPrompt }, ...messages]
        : messages;
      return {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: msgs,
          max_tokens: 4096
        })
      };
    },
    parseResponse: (data) => {
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      return data.choices?.[0]?.message?.content || '（無回應）';
    }
  },
  deepseek: {
    name: 'DeepSeek',
    defaultModel: 'deepseek-chat',
    endpoint: 'https://api.deepseek.com/chat/completions',
    buildRequest: (messages, model, systemPrompt) => {
      const msgs = systemPrompt
        ? [{ role: 'system', content: systemPrompt }, ...messages]
        : messages;
      return {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: msgs,
          max_tokens: 4096
        })
      };
    },
    parseResponse: (data) => {
      if (data.error) throw new Error(data.error.message);
      return data.choices?.[0]?.message?.content || '（無回應）';
    }
  }
};

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('aichat_config');
  if (saved) {
    try {
      config = JSON.parse(saved);
      document.getElementById('providerSelect').value = config.provider;
      document.getElementById('apiKeyInput').value = config.apiKey;
      document.getElementById('modelInput').value = config.model;
      document.getElementById('systemPrompt').value = config.systemPrompt;
      updateModelHint();
      if (config.apiKey) {
        showChat();
      }
    } catch(e) {}
  }

  const savedHistory = localStorage.getItem('aichat_history');
  if (savedHistory) {
    try {
      conversationHistory = JSON.parse(savedHistory);
      conversationHistory.forEach(m => {
        addMessageBubble(m.role === 'user' ? 'user' : 'ai', m.content);
      });
      if (conversationHistory.length > 0) {
        document.getElementById('welcome').style.display = 'none';
      }
    } catch(e) {}
  }
});

// ===== UI FUNCTIONS =====
function toggleSetup() {
  const panel = document.getElementById('setupPanel');
  const chat = document.getElementById('chatArea');
  if (panel.classList.contains('active')) {
    panel.classList.remove('active');
    if (config.apiKey) chat.classList.remove('hidden');
  } else {
    panel.classList.add('active');
    chat.classList.add('hidden');
  }
}

function showChat() {
  document.getElementById('setupPanel').classList.remove('active');
  document.getElementById('chatArea').classList.remove('hidden');
  document.getElementById('newChatBtn').style.display = '';
  populateModelSelector();
  const p = PROVIDERS[config.provider];
  const modelName = config.model || p.defaultModel;
  document.getElementById('statusBar').textContent = `${p.name} · ${modelName}`;
}

let cachedModels = [];

const MODEL_FETCHERS = {
  anthropic: async () => {
    // Anthropic doesn't have a public models list endpoint accessible from browser
    return [
      { value: 'claude-sonnet-4-6', label: 'Claude Sonnet 4.6' },
      { value: 'claude-opus-4-6', label: 'Claude Opus 4.6' },
      { value: 'claude-haiku-4-5-20251001', label: 'Claude Haiku 4.5' }
    ];
  },
  openai: async () => {
    try {
      const res = await fetch('https://api.openai.com/v1/models', {
        headers: { 'Authorization': `Bearer ${config.apiKey}` }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return (data.data || [])
        .filter(m => m.id.includes('gpt') || m.id.includes('o3') || m.id.includes('o4'))
        .sort((a, b) => a.id.localeCompare(b.id))
        .map(m => ({ value: m.id, label: m.id }));
    } catch(e) {
      console.error('Failed to fetch OpenAI models:', e);
      return [{ value: 'gpt-4o-mini', label: 'gpt-4o-mini' }, { value: 'gpt-4o', label: 'gpt-4o' }];
    }
  },
  gemini: async () => {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${config.apiKey}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return (data.models || [])
        .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
        .map(m => {
          const id = m.name.replace('models/', '');
          return { value: id, label: m.displayName || id };
        })
        .sort((a, b) => a.label.localeCompare(b.label));
    } catch(e) {
      console.error('Failed to fetch Gemini models:', e);
      return [{ value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' }];
    }
  },
  openrouter: async () => {
    try {
      const res = await fetch('https://openrouter.ai/api/v1/models');
      const data = await res.json();
      return (data.data || [])
        .map(m => ({ value: m.id, label: m.name || m.id }))
        .sort((a, b) => a.label.localeCompare(b.label));
    } catch(e) {
      console.error('Failed to fetch OpenRouter models:', e);
      return [{ value: 'anthropic/claude-sonnet-4-6', label: 'Claude Sonnet 4.6' }];
    }
  },
  deepseek: async () => {
    try {
      const res = await fetch('https://api.deepseek.com/models', {
        headers: { 'Authorization': `Bearer ${config.apiKey}` }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return (data.data || [])
        .map(m => ({ value: m.id, label: m.id }))
        .sort((a, b) => a.label.localeCompare(b.label));
    } catch(e) {
      console.error('Failed to fetch DeepSeek models:', e);
      return [{ value: 'deepseek-chat', label: 'deepseek-chat' }];
    }
  }
};

async function fetchModels() {
  const select = document.getElementById('chatModelSelect');
  const bar = document.getElementById('modelBar');
  bar.style.display = '';
  select.innerHTML = '<option>載入中...</option>';
  select.disabled = true;

  try {
    const fetcher = MODEL_FETCHERS[config.provider];
    cachedModels = fetcher ? await fetcher() : [];
    
    if (cachedModels.length === 0) {
      select.innerHTML = '<option>找不到模型</option>';
      return;
    }

    select.innerHTML = '';
    const currentModel = config.model || PROVIDERS[config.provider].defaultModel;
    
    cachedModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.value;
      opt.textContent = m.label;
      if (m.value === currentModel) opt.selected = true;
      select.appendChild(opt);
    });
  } catch(e) {
    select.innerHTML = '<option>載入失敗</option>';
  } finally {
    select.disabled = false;
  }
}

function populateModelSelector() {
  fetchModels();
}

function switchModel() {
  const newModel = document.getElementById('chatModelSelect').value;
  config.model = newModel;
  localStorage.setItem('aichat_config', JSON.stringify(config));
  const p = PROVIDERS[config.provider];
  document.getElementById('statusBar').textContent = `${p.name} · ${newModel}`;
}

function newChat() {
  if (conversationHistory.length > 0 && !confirm('確定要開新對話嗎？目前的對話會被清除')) return;
  conversationHistory = [];
  localStorage.removeItem('aichat_history');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = '';
  const p = PROVIDERS[config.provider];
  const modelName = config.model || p.defaultModel;
  document.getElementById('statusBar').textContent = `${p.name} · ${modelName}`;
}

function updateModelHint() {
  const provider = document.getElementById('providerSelect').value;
  const hints = {
    anthropic: '預設：claude-sonnet-4-6',
    openai: '預設：gpt-4o-mini',
    gemini: '預設：gemini-2.5-flash',
    openrouter: '預設：anthropic/claude-sonnet-4-6',
    deepseek: '預設：deepseek-chat'
  };
  document.getElementById('modelHint').textContent = hints[provider];
}

function saveSettings() {
  config.provider = document.getElementById('providerSelect').value;
  config.apiKey = document.getElementById('apiKeyInput').value.trim();
  config.model = document.getElementById('modelInput').value.trim();
  config.systemPrompt = document.getElementById('systemPrompt').value.trim();

  if (!config.apiKey) {
    alert('請輸入 API Key');
    return;
  }

  localStorage.setItem('aichat_config', JSON.stringify(config));
  
  // Clear history on provider/model change
  conversationHistory = [];
  localStorage.removeItem('aichat_history');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = '';
  
  showChat();
}

function clearAll() {
  if (!confirm('確定要清除所有設定和對話紀錄嗎？')) return;
  localStorage.removeItem('aichat_config');
  localStorage.removeItem('aichat_history');
  config = { provider: 'anthropic', apiKey: '', model: '', systemPrompt: '' };
  conversationHistory = [];
  document.getElementById('providerSelect').value = 'anthropic';
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('modelInput').value = '';
  document.getElementById('systemPrompt').value = '';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = '';
  updateModelHint();
}

function addMessageBubble(type, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ===== DEFAULT SYSTEM PROMPT =====
const DEFAULT_SYSTEM_PROMPT = `你是一個友善、健談、熱情的繁體中文 AI 助手。

你的回覆風格：
- 用繁體中文回答，語氣親切自然像朋友聊天
- 回覆要有內容、有延伸，不要只用一兩句話打發
- 適當使用表情符號讓對話更生動
- 如果對方問了有趣的問題，可以多聊幾句、分享相關的知識或想法
- 記住對話中提到的內容，讓對話有連貫性`;

// ===== SEND MESSAGE =====
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  // Hide welcome
  document.getElementById('welcome').style.display = 'none';

  // Add user message
  addMessageBubble('user', text);
  conversationHistory.push({ role: 'user', content: text });

  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('typing').classList.add('active');
  document.getElementById('statusBar').textContent = '思考中...';

  try {
    const provider = PROVIDERS[config.provider];
    const model = config.model || provider.defaultModel;
    
    let endpoint = provider.endpoint;
    if (provider.getEndpoint) {
      endpoint = provider.getEndpoint(model);
    }

    const activeSystemPrompt = config.systemPrompt || DEFAULT_SYSTEM_PROMPT;

    const requestOpts = provider.buildRequest(
      conversationHistory,
      model,
      activeSystemPrompt
    );

    const response = await fetch(endpoint, requestOpts);
    const data = await response.json();
    const reply = provider.parseResponse(data);

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessageBubble('ai', reply);

    // Save history
    localStorage.setItem('aichat_history', JSON.stringify(conversationHistory));

    document.getElementById('statusBar').textContent = 
      `${provider.name} · ${model} · ${conversationHistory.length} 則訊息`;

  } catch (err) {
    addMessageBubble('error', `錯誤：${err.message}`);
    // Remove the failed user message from history
    conversationHistory.pop();
    document.getElementById('statusBar').textContent = '發生錯誤';
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('typing').classList.remove('active');
  }
}
</script>
